name: Publish to npm

# Note: This workflow requires either:
# 1. NPM_TOKEN secret configured in GitHub repository settings
#    (Settings > Secrets and variables > Actions > New repository secret)
#    Get your token from: https://www.npmjs.com/settings/YOUR_USERNAME/tokens
# 2. OR OIDC configured for npm (requires package to exist first)
#
# For first-time publishing, you may need to publish manually once:
# npm login
# npm publish --access public

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            echo "Using NPM_TOKEN for authentication"
            npm publish --access public || {
              echo "Publish failed. If this is the first time publishing, you may need to:"
              echo "1. Create the package manually on npmjs.com, OR"
              echo "2. Ensure NPM_TOKEN has publish permissions"
              exit 1
            }
          else
            echo "Attempting OIDC authentication with provenance"
            npm publish --access public --provenance || {
              echo "OIDC publish failed. Please configure NPM_TOKEN secret in repository settings."
              echo "Get your token from: https://www.npmjs.com/settings/YOUR_USERNAME/tokens"
              exit 1
            }
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
